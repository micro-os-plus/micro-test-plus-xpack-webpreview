# https://micro-os-plus.github.io/micro-test-plus-xpack-webpreview/
# https://github.com/micro-os-plus/micro-test-plus-xpack-webpreview/actions/workflows/publish-github-pages-from-remote.yml

# Simple workflow for deploying static content to GitHub Pages
name: GitHub Pages

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      repository:
        description: The GitHub repository with the web content
        required: true
      ref:
        description: The branch with the web content
        required: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        # https://github.com/actions/checkout
        uses: actions/checkout@v6.0.2
        with:
          repository: '${{inputs.repository}}'
          ref: '${{inputs.ref}}'
          # The full history, required to compute lastUpdatedAt
          fetch-depth: 0

      - name: Use Nodejs
        # https://github.com/actions/setup-node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm --prefix website ci

      - name: Install Doxygen & generate Doxygen web preview
        # https://www.doxygen.nl/download.html
        env:
          DOXYGEN_VERSION: "1.17.0"
        run: |
          curl https://www.doxygen.nl/files/doxygen-$DOXYGEN_VERSION.linux.bin.tar.gz --output doxygen-$DOXYGEN_VERSION.linux.bin.tar.gz
          tar xf doxygen-$DOXYGEN_VERSION.linux.bin.tar.gz
          ls -l doxygen-$DOXYGEN_VERSION
          mkdir -pv website/doxygen/.local/bin
          ln -sv $(pwd)/doxygen-$DOXYGEN_VERSION/bin/doxygen website/doxygen/.local/bin/doxygen
          ls -l website website/doxygen
          echo "$(pwd)/website/doxygen/.local/bin" >> $GITHUB_PATH
          npm --prefix website run generate-webpreview-doxygen

      - name: Build the Docusaurus site
        env:
          DOCUSAURUS_BASEURL: '/micro-test-plus-xpack-webpreview/'
          DOCUSAURUS_IS_PREVIEW: 'true'
        run: npm --prefix website run build

      - name: Setup Pages
        # https://github.com/actions/configure-pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        # https://github.com/actions/upload-pages-artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          # Upload entire repository
          path: './website/build'

      - name: Deploy to GitHub Pages
        id: deployment
        # https://github.com/actions/deploy-pages
        uses: actions/deploy-pages@v5.0.0
